security:
    password_hashers:
        App\Entity\Users: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Users
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        api:
            pattern: ^/api
            stateless: true
            jwt: ~

    access_control:
        - { path: ^/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/auth/register$, roles: PUBLIC_ACCESS }
        - { path: ^/auth/logout$, roles: PUBLIC_ACCESS }
        - { path: ^/auth/forgot_password, roles: PUBLIC_ACCESS }
        - { path: ^/auth/verify-forgot_password, roles: PUBLIC_ACCESS }
        - { path: ^/api/test$, roles: PUBLIC_ACCESS }
        - { path: ^/api/reservations/reservation-confirm, roles: PUBLIC_ACCESS }
        - { path: ^/auth/register-admin, roles: ROLE_ADMIN }
        # Vehicles - ADMIN only (all methods including GET)
        - { path: ^/api/vehicles, roles: ROLE_ADMIN }
        # Drivers - ADMIN only (all methods including GET)
        - { path: ^/api/drivers, roles: ROLE_ADMIN }
        # Pricing management - ADMIN only for write operations
        - { path: ^/api/pricing, methods: [POST, PUT, PATCH, DELETE], roles: ROLE_ADMIN }
        # All other /api routes require a valid JWT token (ROLE_USER)
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }