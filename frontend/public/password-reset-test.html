<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #6c757d;
            font-size: 1.1rem;
        }

        .section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            background: #f8f9fa;
        }

        .section h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #545b62;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .reset-link {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1rem;
            word-break: break-all;
            margin: 1rem 0;
        }

        .reset-link code {
            color: #e83e8c;
            font-size: 0.875rem;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .results pre {
            background: #f1f3f4;
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 0.875rem;
        }

        .instructions {
            background: #e7f5ff;
            border: 1px solid #b3d7ff;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .instructions h4 {
            color: #004085;
            margin-bottom: 0.5rem;
        }

        .instructions ol {
            margin: 0;
            padding-left: 1.5rem;
            color: #004085;
        }

        .instructions li {
            margin-bottom: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Password Reset Test</h1>
                <p>Complete testing of the password reset functionality</p>
            </div>

            <div id="alerts"></div>

            <!-- Step 1: Request Password Reset -->
            <div class="section">
                <h2>Step 1: Request Password Reset</h2>
                <form id="forgotPasswordForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="forgotPasswordBtn">Send Reset Link</button>
                </form>
            </div>

            <!-- Step 2: Test Reset Link -->
            <div class="section" id="resetLinkSection" style="display: none;">
                <h2>Step 2: Test Reset Link</h2>
                <div id="resetLinkContent"></div>
            </div>

            <!-- Step 3: Reset Password -->
            <div class="section" id="resetPasswordSection" style="display: none;">
                <h2>Step 3: Reset Password</h2>
                <form id="resetPasswordForm">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required>
                    </div>
                    <button type="submit" class="btn btn-success" id="resetPasswordBtn">Reset Password</button>
                </form>
            </div>

            <!-- Results -->
            <div class="section" id="resultsSection" style="display: none;">
                <h2>Test Results</h2>
                <div id="resultsContent"></div>
            </div>
        </div>
    </div>

    <script>
        let currentResetUrl = '';

        function showAlert(message, type = 'info') {
            const alertsContainer = document.getElementById('alerts');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alertsContainer.appendChild(alert);
            
            // Auto-remove after 5 seconds
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        function showLoading(buttonId, loading = true) {
            const button = document.getElementById(buttonId);
            if (loading) {
                button.disabled = true;
                button.innerHTML = '<div class="spinner"></div>';
            } else {
                button.disabled = false;
                button.textContent = button.id === 'forgotPasswordBtn' ? 'Send Reset Link' : 'Reset Password';
            }
        }

        // Step 1: Forgot Password
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            if (!email) {
                showAlert('Please enter your email address', 'error');
                return;
            }

            showLoading('forgotPasswordBtn');

            try {
                const response = await fetch('http://localhost:8000/auth/forgot_password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(data.message || 'Password reset link sent!', 'success');
                    
                    // Create demo reset link
                    const demoLink = `http://localhost:8000/auth/verify-forgot_password?email=${encodeURIComponent(email)}&expires=${Date.now() + 3600000}&signature=demo_signature_${Date.now()}&timestamp=${Date.now()}&token=demo_token`;
                    currentResetUrl = demoLink;
                    
                    // Show reset link section
                    const resetLinkSection = document.getElementById('resetLinkSection');
                    const resetLinkContent = document.getElementById('resetLinkContent');
                    
                    resetLinkContent.innerHTML = `
                        <div class="instructions">
                            <h4>Reset Link Generated</h4>
                            <ol>
                                <li>Click "Test Reset Link" to simulate clicking the email link</li>
                                <li>This will take you to the password reset page</li>
                                <li>Enter a new password to complete the reset</li>
                            </ol>
                        </div>
                        <div class="reset-link">
                            <strong>Reset Link:</strong><br>
                            <code>${demoLink}</code>
                        </div>
                        <div class="button-group">
                            <button class="btn btn-primary" onclick="testResetLink()">Test Reset Link</button>
                            <button class="btn btn-secondary" onclick="copyResetLink()">Copy Link</button>
                        </div>
                    `;
                    
                    resetLinkSection.style.display = 'block';
                } else {
                    showAlert(data.error || 'Failed to send reset link', 'error');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error');
            } finally {
                showLoading('forgotPasswordBtn', false);
            }
        });

        function testResetLink() {
            if (currentResetUrl) {
                window.location.href = currentResetUrl;
            }
        }

        function copyResetLink() {
            if (currentResetUrl) {
                navigator.clipboard.writeText(currentResetUrl);
                showAlert('Reset link copied to clipboard!', 'success');
            }
        }

        // Check if we're on a reset password page
        function checkResetPasswordPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            
            if (email && window.location.pathname.includes('verify-forgot_password')) {
                // We're on the reset password page
                const resetPasswordSection = document.getElementById('resetPasswordSection');
                resetPasswordSection.style.display = 'block';
                
                // Validate the reset link
                validateResetLink();
            }
        }

        async function validateResetLink() {
            showAlert('Validating reset link...', 'info');
            
            try {
                const response = await fetch(window.location.href, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Reset link is valid! Please enter your new password.', 'success');
                } else {
                    showAlert(data.error || 'Invalid or expired reset link', 'error');
                }
            } catch (error) {
                showAlert('Error validating reset link: ' + error.message, 'error');
            }
        }

        // Reset password form
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showAlert('Password must be at least 6 characters long', 'error');
                return;
            }

            showLoading('resetPasswordBtn');

            try {
                const response = await fetch(window.location.href, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify({ password: newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(data.message || 'Password reset successful!', 'success');
                    
                    // Show results
                    const resultsSection = document.getElementById('resultsSection');
                    const resultsContent = document.getElementById('resultsContent');
                    
                    resultsContent.innerHTML = `
                        <div class="alert alert-success">
                            <h4>Password Reset Complete!</h4>
                            <p>Your password has been successfully reset.</p>
                            <p>You can now login with your new password.</p>
                        </div>
                        <div class="button-group">
                            <button class="btn btn-primary" onclick="window.location.href='/password-reset-test.html'">Test Again</button>
                            <button class="btn btn-secondary" onclick="window.location.href='/'">Go to Login</button>
                        </div>
                    `;
                    
                    resultsSection.style.display = 'block';
                } else {
                    showAlert(data.error || 'Failed to reset password', 'error');
                }
            } catch (error) {
                showAlert('Error resetting password: ' + error.message, 'error');
            } finally {
                showLoading('resetPasswordBtn', false);
            }
        });

        // Check if we're on a reset password page when page loads
        checkResetPasswordPage();
    </script>
</body>
</html>
