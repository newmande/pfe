<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #545b62;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .reset-link {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 12px;
            margin: 16px 0;
            word-break: break-all;
        }

        .reset-link code {
            color: #e83e8c;
            font-size: 11px;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        .back-btn {
            background: transparent;
            color: #667eea;
            border: 1px solid #667eea;
        }

        .back-btn:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Forgot Password</h1>
            <p>Reset your password in simple steps</p>
        </div>

        <div id="alerts"></div>

        <!-- Step 1: Request Reset -->
        <div id="step1" class="step active">
            <form id="requestForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                </div>
                <button type="submit" class="btn btn-primary" id="requestBtn">Send Reset Link</button>
            </form>
        </div>

        <!-- Step 2: Reset Link Generated -->
        <div id="step2" class="step">
            <p>Reset link generated! Click the button below to test it.</p>
            <div class="reset-link" id="resetLink"></div>
            <button class="btn btn-primary" id="testLinkBtn">Test Reset Link</button>
            <button class="btn back-btn" id="backBtn">Back</button>
        </div>

        <!-- Step 3: Reset Password -->
        <div id="step3" class="step">
            <form id="resetForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="resetBtn">Reset Password</button>
            </form>
        </div>

        <!-- Success -->
        <div id="success" class="step">
            <div class="alert alert-success">
                Password reset successful! You can now login with your new password.
            </div>
            <button class="btn btn-primary" onclick="location.reload()">Test Again</button>
        </div>
    </div>

    <script>
        let resetUrl = '';

        function showAlert(message, type = 'info') {
            const alertsContainer = document.getElementById('alerts');
            alertsContainer.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            
            setTimeout(() => {
                alertsContainer.innerHTML = '';
            }, 5000);
        }

        function showStep(stepNumber) {
            document.querySelectorAll('.step').forEach(step => {
                step.classList.remove('active');
            });
            document.getElementById('step' + stepNumber).classList.add('active');
        }

        function setLoading(buttonId, loading = true) {
            const button = document.getElementById(buttonId);
            if (loading) {
                button.disabled = true;
                button.innerHTML = '<span class="loading"></span> Loading...';
            } else {
                button.disabled = false;
                if (buttonId === 'requestBtn') button.textContent = 'Send Reset Link';
                if (buttonId === 'resetBtn') button.textContent = 'Reset Password';
            }
        }

        // Step 1: Request Reset
        document.getElementById('requestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            if (!email) {
                showAlert('Please enter your email address', 'error');
                return;
            }

            setLoading('requestBtn');

            try {
                const response = await fetch('http://localhost:8000/auth/forgot_password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Reset link generated successfully!', 'success');
                    
                    if (data.resetUrl) {
                        resetUrl = data.resetUrl;
                        
                        // Show reset link
                        document.getElementById('resetLink').innerHTML = `
                            <strong>Reset Link:</strong><br>
                            <code>${data.resetUrl}</code>
                        `;
                        
                        showStep(2);
                    }
                } else {
                    showAlert(data.error || 'Failed to generate reset link', 'error');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error');
            } finally {
                setLoading('requestBtn', false);
            }
        });

        // Step 2: Test Reset Link
        document.getElementById('testLinkBtn').addEventListener('click', () => {
            if (resetUrl) {
                // Extract the signed URL parameters and redirect to reset-password.html
                const url = new URL(resetUrl);
                const params = url.search;
                window.location.href = `/reset-password.html${params}`;
            }
        });

        document.getElementById('backBtn').addEventListener('click', () => {
            showStep(1);
        });

        // Step 3: Reset Password
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showAlert('Password must be at least 6 characters long', 'error');
                return;
            }

            setLoading('resetBtn');

            try {
                const response = await fetch(window.location.href, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify({ password: newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Password reset successful!', 'success');
                    showStep('success');
                } else {
                    showAlert(data.error || 'Failed to reset password', 'error');
                }
            } catch (error) {
                showAlert('Error resetting password: ' + error.message, 'error');
            } finally {
                setLoading('resetBtn', false);
            }
        });

        // Check if we're on a reset password page
        function checkResetPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            
            if (email && window.location.pathname.includes('verify-forgot_password')) {
                // Validate the reset link
                validateResetLink();
            }
        }

        async function validateResetLink() {
            try {
                const response = await fetch(window.location.href, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Reset link is valid! Please enter your new password.', 'success');
                    showStep(3);
                } else {
                    showAlert(data.error || 'Invalid or expired reset link', 'error');
                    showStep(1);
                }
            } catch (error) {
                showAlert('Error validating reset link: ' + error.message, 'error');
                showStep(1);
            }
        }

        // Check for reset page on load
        checkResetPage();
    </script>
</body>
</html>
