<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #545b62;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }

        .success-icon::before {
            content: "Check";
            display: block;
            background: #28a745;
            color: white;
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            margin: 0 auto;
        }

        .password-strength {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
        }

        .password-strength.weak {
            color: #dc3545;
        }

        .password-strength.medium {
            color: #ffc107;
        }

        .password-strength.strong {
            color: #28a745;
        }

        .email-display {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Reset Password</h1>
            <p>Enter your new password below</p>
        </div>

        <div id="alerts"></div>

        <!-- Loading State -->
        <div id="loadingState" class="alert alert-info">
            <div class="loading"></div> Validating reset link...
        </div>

        <!-- Reset Form -->
        <div id="resetForm" style="display: none;">
            <div class="email-display">
                Resetting password for: <strong id="userEmail"></strong>
            </div>
            
            <form id="passwordForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required>
                    <div class="password-strength" id="passwordStrength"></div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required>
                </div>
                
                <button type="submit" class="btn btn-primary" id="resetBtn">Reset Password</button>
            </form>
        </div>

        <!-- Success State -->
        <div id="successState" style="display: none;">
            <div class="success-icon"></div>
            <div class="alert alert-success">
                <h3>Password Reset Successful!</h3>
                <p>Your password has been successfully updated.</p>
                <p>You can now login with your new password.</p>
            </div>
            <button class="btn btn-primary" onclick="goToLogin()">Go to Login</button>
        </div>
    </div>

    <script>
        let userEmail = '';
        let resetUrl = '';

        function showAlert(message, type = 'info') {
            const alertsContainer = document.getElementById('alerts');
            alertsContainer.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            
            setTimeout(() => {
                alertsContainer.innerHTML = '';
            }, 5000);
        }

        function setLoading(buttonId, loading = true) {
            const button = document.getElementById(buttonId);
            if (loading) {
                button.disabled = true;
                button.innerHTML = '<span class="loading"></span> Resetting Password...';
            } else {
                button.disabled = false;
                button.textContent = 'Reset Password';
            }
        }

        function checkPasswordStrength(password) {
            const strengthEl = document.getElementById('passwordStrength');
            let strength = 0;
            let feedback = '';

            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;

            if (strength < 3) {
                feedback = 'Weak password';
                strengthEl.className = 'password-strength weak';
            } else if (strength < 5) {
                feedback = 'Medium password';
                strengthEl.className = 'password-strength medium';
            } else {
                feedback = 'Strong password';
                strengthEl.className = 'password-strength strong';
            }

            strengthEl.textContent = feedback;
        }

        function showResetForm(email) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('resetForm').style.display = 'block';
            document.getElementById('userEmail').textContent = email;
            userEmail = email;
        }

        function showSuccessState() {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('successState').style.display = 'block';
        }

        function goToLogin() {
            window.location.href = '/';
        }

        // Validate reset link on page load
        async function validateResetLink() {
            // Get the URL parameters from the current page
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            
            if (!email) {
                showAlert('Invalid reset link: missing email parameter', 'error');
                setTimeout(() => {
                    window.location.href = '/forgot-password.html';
                }, 3000);
                return;
            }

            // Build the backend validation URL using the current page's parameters
            const backendUrl = `http://localhost:8001/auth/verify-forgot_password?${urlParams.toString()}`;
            resetUrl = backendUrl;
            
            try {
                const response = await fetch(backendUrl, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    // Link is valid, show reset form
                    showAlert('Reset link is valid! Please enter your new password.', 'success');
                    showResetForm(data.email || 'your account');
                } else {
                    // Link is invalid or expired
                    showAlert(data.error || 'Invalid or expired reset link', 'error');
                    setTimeout(() => {
                        window.location.href = '/forgot-password.html';
                    }, 3000);
                }
            } catch (error) {
                showAlert('Error validating reset link: ' + error.message, 'error');
                setTimeout(() => {
                    window.location.href = '/forgot-password.html';
                }, 3000);
            }
        }

        // Handle password reset form submission
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validation
            if (newPassword.length < 6) {
                showAlert('Password must be at least 6 characters long', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            setLoading('resetBtn');

            try {
                const response = await fetch(resetUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify({ password: newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Password reset successful!', 'success');
                    showSuccessState();
                } else {
                    showAlert(data.error || 'Failed to reset password', 'error');
                }
            } catch (error) {
                showAlert('Error resetting password: ' + error.message, 'error');
            } finally {
                setLoading('resetBtn', false);
            }
        });

        // Password strength checker
        document.getElementById('newPassword').addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
        });

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            validateResetLink();
        });
    </script>
</body>
</html>
